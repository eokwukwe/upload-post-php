name: Tests

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  codecheck:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug
          extensions: fileinfo, mbstring
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run quality gate
        run: composer codecheck

      - name: Run coverage
        run: composer test:coverage -- --min=90
